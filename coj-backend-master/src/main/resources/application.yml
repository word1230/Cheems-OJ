# 公共配置文件
# @author cheems
#
spring:
  application:
    name: coj-backend
  # 默认 dev 环境
  profiles:
    active: dev
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # session 配置
  session:
    # 分布式登录
    store-type: redis
    # 30 天过期
    timeout: 2592000

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/coj
    username: root
    password: 123456
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual
    port: 5672
    host: localhost
    username: guest
    password: guest

  # Redis 配置
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
    password: 123456
server:
  address: 0.0.0.0
  port: 8121
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
# ES 配置
  elasticsearch:
    uris: http://localhost:9200


# 代码沙箱配置
codesandbox:
  type: remote
  # API 签名认证（需与 coj-code-sandbox 中的配置保持一致）
  auth:
    access-key: coj-client
    secret-key: your-strong-secret-key-here

